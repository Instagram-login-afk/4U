<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="hi.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(ellipse at top left, #2d1e1b 0%, #111 100%);
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #hearts-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 1;
        }
        .floating-heart {
            position: absolute;
            bottom: -40px;
            animation: float-heart linear forwards;
            will-change: transform, opacity;
        }
        @keyframes float-heart {
            to {
                transform: translateY(-50vh) scale(1.2) rotate(12deg);
                opacity: 0;
            }
        }
        .memories {
            max-width: 900px;
            margin: 40px auto 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            justify-content: center;
            z-index: 2;
            position: relative;
        }
        .memories img {
            width: 260px;
            height: 260px;
            object-fit: contain;
            border-radius: 18px;
            box-shadow: 0 2px 16px #b85c3866;
            border: none;
            background: radial-gradient(ellipse at top left, #2d1e1b 0%, #111 100%);
        }
        .back-btn {
            background: #b85c38;
            color: #fffbe7;
            font-family: 'Great Vibes', cursive;
            font-size: 2em;
            padding: 12px 38px;
            border: none;
            border-radius: 28px;
            box-shadow: 0 2px 12px #b85c3866;
            cursor: pointer;
            transition: background 0.2s;
            margin: 40px auto;
            display: block;
            z-index: 2;
            position: relative;
        }
    </style>
</head>
<body>
    <div id="hearts-bg"></div>
    <h1 style="text-align:center;font-family:'Great Vibes',cursive;color:#b85c38;z-index:2;position:relative;">Just For You</h1>
    <p style="font-size:1.2em;line-height:1.6;color:#fffbe7;text-align:center;z-index:2;position:relative;">
        I hope this page makes you smile.<br>
        Every memory<br>
        Is here because of you.<br>
        <span style="color:#b85c38;">❤️</span>
    </p>
    <div class="memories">
        <img src="1.jpg" alt="Memory 1">
        <img src="2.jpg" alt="Memory 2">
        <img src="3.jpg" alt="Memory 3">
        <img src="4.jpg" alt="Memory 4">
        <img src="5.jpg" alt="Memory 5">
        <img src="6.jpg" alt="Memory 6">
        <img src="7.jpg" alt="Memory 7">
        <img src="8.jpg" alt="Memory 8">
        <img src="9.jpg" alt="Memory 9">
    </div>
    <button onclick="window.location.href='love.html';" class="back-btn">
        Back
    </button>
    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (3 + Math.random() * 3) + 's';
            heart.style.fontSize = (18 + Math.random() * 22) + 'px';
            heart.style.opacity = 0.7 + Math.random() * 0.3;
            heart.innerHTML = '❤️';
            document.getElementById('hearts-bg').appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
        setInterval(createHeart, 500);
    </script>
</body>
</html>
